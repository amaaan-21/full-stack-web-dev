<!--
Create a form with:

1. A Name field (required).
2. A checkbox labeled “I accept the Terms and Conditions” that is:
    * checked by default.
    * required.
3. A Submit button.
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>checked</title>
</head>
<body>
    //checked to use in checkbox or radio and its automatically checked already
    <header>
        <p>form basic practice about checked tag</p>
    </header>
    <main>
        <form>
            <div>
                <label for="name">Name</label>
                <input id="name" type="text" required>
            </div>
            <div>
                <label for="condition">I accept the Term and Condition</label>
                <input id="condition" type="checkbox" checked required>
        
            </div>
            <input type="submit" value="Submit">
        </form>
    </main>
    <footer>
        <p>&copy; 2July 2026 [ 6:04 pm]</p>
    </footer>
</body>
</html>
