<!--
Create a form that contains:

1. A Name field (required)
2. An Email field (required)
3. A Password field (required)
4. A Country dropdown (required)
5. A Submit button
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>required</title>
</head>
<body>
    <header>
        <h2>Form</h2>
    </header>
    <main>
        <div>
            <form>
                <div>
                    <label for="Nm">Name</label>
                    <input id="nm" type="text" required placeholder="first and last name" required>               
                </div>
                <div>
                    <label for="em">Email</label>
                    <input id="em" type="email" placeholder="@example.com" required>
                </div>
                <div>
                    <label for="p">Password</label>
                    <input id="p" type="password" required >
                </div>
                <div>
                    <select required>
                        <option>choose</option>
                        <option>Canada</option>
                        <option>China</option>
                    </select>
                </div>
                <input type="submit" value="submit">


            </form>
        </div>
    </main>
</body>
</html>
