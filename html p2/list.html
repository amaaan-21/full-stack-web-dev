<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>list in html</title>
</head>
<body>
    <h1>lists</h1>
    <h2>unorder list</h2>
    <ul>
        <li>bread</li>
        <li>jam</li>
        <li>milk</li>
    </ul>
    <h2>order list</h2>
    <ol>
        <li>bread</li>
        <li>jam</li>
        <li>milk</li>
    </ol>

    
</body>
</html>
